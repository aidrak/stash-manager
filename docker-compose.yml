services:
  stash-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stash-manager
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PYTHONPATH=/home/appuser
      - TZ=America/Chicago
    env_file: .env
    volumes:
      - /mnt/user/appdata/stash-manager/config:/home/appuser/config
      - ${MEDIA_PATH:-./media}:/media
    networks:
      - media_net

networks:
  media_net:
    external: true
